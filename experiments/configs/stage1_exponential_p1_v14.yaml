# Stage 1 v14: Further extend epochs to improve hazard fit
# Changes from v11:
#   - n_epochs: 7000 → 9000 (more training time)
#   - Everything else identical to v11

experiment_name: stage1_exp_p1_v14
rationale: "v11: β=0.0730 ✓, haz=0.1741. v13 showed observed_times gives haz=0.0593 but ruins β.
  Try extending v11 (uniform collocation) to 9000 epochs to give more time for hazard to improve
  naturally without switching collocation method. Goal: keep β<0.10 while reducing hazard below 0.05."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 9000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
