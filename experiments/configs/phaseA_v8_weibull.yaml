rationale: "Sweep cell \u2014 architecture phaseA_v8, baseline weibull, p=1. phaseA_v8\
  \ \u2014 n_epochs 12000 \u2192 3000. v6/v7 both had the same tail failure mode (overshoot\
  \ for Weibull/Piecewise, undershoot for Gompertz) despite different \u03B3-net sizes\
  \ \u2014 suggests it's overfitting in late-event regions, not insufficient capacity.\
  \ Shorter training is the simplest test of that hypothesis."
model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims:
    - 64
    - 64
    - 64
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims:
    - 64
    - 64
    activation: silu
    use_layer_norm: false
    time_features:
    - t
    - log_t
    input_clamp_min: 0.01
    input_clamp_max: 1.0
  n_covariates: 1
training:
  beta_initialization: cox_pl
  n_epochs: 3000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0
evaluation:
  hazard_time_extension: 0.1
  thresholds:
    beta_rmse: 0.1
    hazard_irmse: 0.05
    c_index: 0.75
experiment_name: phaseA_v8_weibull
simulation:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.5
  n_covariates: 1
  n_samples: 1000
  censoring_rate: 0.3
  censoring_type: random_exponential
  random_seed: 42
