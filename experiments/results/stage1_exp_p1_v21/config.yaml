checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v21
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 0.8
  pl: 1.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 9000
optimizer_name: adamw
rationale: "v16 (seed=42) achieved best results: \u03B2=0.0271 \u2713, haz=0.0070\
  \ \u2713, c-index=0.7164 \u2717. Only needs 1.2% improvement in C-index (0.7164\u2192\
  0.75). The partial likelihood loss (PL) emphasizes concordant rankings. Try increasing\
  \ w2 from 0.5 to 1.5 to emphasize ranking, reducing ODE slightly to balance."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
