# Stage 2 v1: Weibull baseline, 1 covariate
# Starts from the best Stage 1 SiLU/AdamW setup and evaluates the baseline hazard
# over a 10% extended upper time window.

experiment_name: stage2_weibull_p1_v1
rationale: "Stage 1 established that the SiLU/AdamW configuration can recover beta and
  a constant baseline hazard. Move to Stage 2 with a Weibull baseline, keeping the same
  architecture and optimizer settings. Hazard evaluation uses a 10% upper time extension
  to check calibration slightly beyond the observed-time range; thresholds are unchanged
  because Stage 1 still passes under the expanded window."

simulation:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: silu
    use_layer_norm: false

training:
  n_epochs: 12000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
