rationale: "Sweep cell \u2014 architecture phaseB_v3, baseline exp, p=4. phaseB_v3\
  \ \u2014 add sqrt_t to the coefficient time features while returning monotonic to\
  \ the v1 value 0.1. v1/v2 both pass beta and C-index, but Weibull is flattened in\
  \ the tail and Gompertz forms a right-boundary spike. The extra concave time feature\
  \ gives gamma(t) another smooth basis direction without changing the loss family\
  \ or beta recipe."
model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims:
    - 64
    - 64
    - 64
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims:
    - 64
    - 64
    activation: silu
    use_layer_norm: false
    time_features:
    - t
    - sqrt_t
    - log_t
    input_clamp_min: 0.01
    input_clamp_max: 1.0
  n_covariates: 4
training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0
evaluation:
  hazard_time_extension: 0.1
  thresholds:
    beta_rmse: 0.1
    hazard_irmse: 0.05
    c_index: 0.75
experiment_name: phaseB_v3_exp
simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  - -0.2
  n_covariates: 4
  n_samples: 1000
  censoring_rate: 0.3
  censoring_type: random_exponential
  random_seed: 42
