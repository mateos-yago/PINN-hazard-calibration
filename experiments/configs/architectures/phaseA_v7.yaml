# Phase A v7: smaller coefficient network
#
# Diff vs phaseA_v6: coefficient.hidden_dims [64, 64] → [32, 32].
# Lower MLP capacity → less freedom to overfit tail-cluster events for
# Weibull/Piecewise. Combined with smoothness=10, expected to stay closer to
# the boundary value of γ in data-sparse regions.

rationale: "phaseA_v7 — coefficient network [64,64] → [32,32]. v6 had opposing
  tail biases across baselines; smaller MLP capacity is a baseline-agnostic way
  to limit how aggressively the network can fit late-event clusters."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
