# Stage 1 v4: Increase coefficient network depth for better hazard fitting
# Changes from v3:
#   - coefficient network: [32, 32] → [64, 64, 64] (deeper network for γ(t))
#   - w3 (ODE) increased to 2.0, w2 (PL) to 1.0 kept from v3
#   - Everything else same as v3

experiment_name: stage1_exp_p1_v4
rationale: "v3 showed β improved (0.1858) but hazard got much worse (0.2977 vs v2's 0.1396).
  Diagnostic: γ(t) network underfitting. Increasing coefficient network depth from [32,32] to [64,64,64]
  to allow better modeling of the constant baseline hazard and its interaction with β."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 3000
  lr: 0.0005
  lr_beta: 0.01
  optimizer_name: adam
  weight_decay: 0.0
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 1.0
    ode: 2.0
    ic: 1.0
