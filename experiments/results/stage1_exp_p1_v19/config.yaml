checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v19
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 9000
optimizer_name: adamw
rationale: "v16 achieved \u03B2=0.9729 \u2713, haz=0.0070 \u2713. All experiments\
  \ show C-index=0.7164. This exact value across all runs suggests either dataset\
  \ limitation or possible evaluation issue. Try different random_seed (42\u2192123)\
  \ to see if it affects C-index or if 0.7164 is fundamental limit."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 123
weight_decay: 0.0001
