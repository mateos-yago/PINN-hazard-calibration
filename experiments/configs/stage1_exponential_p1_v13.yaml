# Stage 1 v13: Use observed times for collocation points
# Changes from v11:
#   - collocation_method: 'uniform' → 'observed_times' (focus ODE on actual data times)
#   - Everything else same as v11 (best so far: β=0.0730, haz=0.1741)
#   - Rationale: ODE residuals should matter most where we have data

experiment_name: stage1_exp_p1_v13
rationale: "v11 achieved β=0.0730 ✓. Hazard=0.1741 is main issue.
  Try collocation_method='observed_times' instead of uniform. ODE constraints at observed times
  may better enforce hazard structure where data is concentrated."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 7000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: observed_times
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
