checkpoint_every: 2000
collocation_method: uniform
experiment_name: phaseC_v1_weibull
gradient_clip: 1.0
loss_weights:
  baseline_ref: 0.0
  ic: 1.0
  mle: 1.0
  monotonic: 0.0
  ode: 1.0
  pl: 0.25
  smoothness: 0.0
lr: 0.0003
lr_beta: 0.0001
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    input_clamp_max: 1.0
    input_clamp_min: 0.01
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 1
  parameterization: factored_surrogate
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: "Sweep cell \u2014 architecture phaseC_v1, baseline weibull, p=1. phaseC_v1\
  \ \u2014 TRUE PINN with the factored surrogate identifiability fix. Restores the\
  \ canonical soft-ODE/soft-IC PINN form (parameterization surrogate, not quadrature)\
  \ and tests whether restricting \u039B_\u03C6 to be a 1-D function of t alone is\
  \ enough to make \u03B3 identifiable without an oracle and without smoothness/monotonic\
  \ shape priors."
simulation_config:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.5
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
