checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v5
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.0
lr: 0.001
lr_beta: 0.01
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 3000
optimizer_name: adam
rationale: "v2 was best result so far (\u03B2=0.2035, haz=0.1396). However, PL loss\
  \ dominates training, accounting for ~5.07 of the 2.276 total loss even at reduced\
  \ weight. Protocol suggests trying w2=0.0. Hypothesis: disabling PL might let MLE+ODE+IC\
  \ converge to better \u03B2 values without PL gradient noise."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0
