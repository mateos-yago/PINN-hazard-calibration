checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v8
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0002
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 6000
optimizer_name: adamw
rationale: "v7 achieved \u03B2 RMSE=0.1037 (target <0.10), hazard=0.1928 (target <0.05).\
  \ Increased regularization to further constrain surrogate and force \u03B2 to capture\
  \ covariate effect. Increased weight decay 3x and lowered LR slightly. With more\
  \ stable convergence, should push \u03B2 under 0.10."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0003
