# Phase A v2: ODE-by-construction (quadrature parameterization)
#
# Diff vs phaseA_v1: replace the freely-learned Λ-surrogate with
# Λ(t,x) = exp(xᵀβ) · ∫₀ᵗ exp(γ(s)) ds evaluated by trapezoidal rule on a fixed
# 200-point grid. The IC Λ(0,x)=0 and the ODE ∂Λ/∂t = exp(γ+xᵀβ) hold exactly
# (up to discretization), so we set their loss weights to 0. Only L_MLE + L_PL
# remain as soft constraints.
#
# Rationale (from phaseA_v1 diagnosis): with two free networks (Λ-surrogate and γ)
# the ODE residual is only soft-enforced. The surrogate can fit MLE on Λ(Y_i,x_i)
# at observed event times while γ floats to a shape that minimizes the residual
# locally but has nothing to do with the true α(t). Removing the surrogate
# eliminates this degree of freedom and makes γ the unique optimizand under MLE+PL.

rationale: "phaseA_v2 — ODE-by-construction via trapezoidal quadrature. Removes
  the Λ-surrogate's freedom; γ becomes the only function under L_MLE+L_PL pressure.
  Tests whether the v1 catastrophic hazard failure was a structural identifiability
  problem of the two-network PINN formulation."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    # Unused under quadrature parameterization but kept for from_config compatibility.
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0          # exact by construction
    ic: 0.0           # exact by construction
    monotonic: 0.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
