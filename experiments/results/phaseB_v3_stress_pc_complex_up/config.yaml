checkpoint_every: 2000
collocation_method: uniform
experiment_name: phaseB_v3_stress_pc_complex_up
gradient_clip: 1.0
loss_weights:
  baseline_ref: 0.0
  ic: 0.0
  mle: 1.0
  mle_weighting: uniform
  monotonic: 0.1
  ode: 0.0
  pl: 0.25
  smoothness: 10.0
lr: 0.0003
lr_beta: 0.0001
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    input_clamp_max: 1.0
    input_clamp_min: 0.01
    time_features:
    - t
    - sqrt_t
    - log_t
    use_layer_norm: false
  n_covariates: 4
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: "Sweep cell \u2014 architecture phaseB_v3_stress, baseline pc_complex_up,\
  \ p=4. phaseB_v3_stress \u2014 exact phaseB_v3 recipe run on out-of-panel baseline\
  \ hazards: complex piecewise-constant shapes and non-monotone hazards. This is a\
  \ stress test only; no architecture tuning is performed."
simulation_config:
  baseline: PiecewiseConstantBaseline
  baseline_params:
    cutpoints:
    - 0.5
    - 1.5
    - 3.0
    - 6.0
    rates:
    - 0.08
    - 0.18
    - 0.45
    - 0.9
    - 1.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  - -0.2
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 4
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
