rationale: "Sweep cell \u2014 architecture phaseA_v10, baseline piecewise, p=1. phaseA_v10\
  \ \u2014 smoothness 10 \u2192 100. Pushing the regularizer harder to see if it can\
  \ close the tail-divergence gap. Expected: tightens Weibull/Piecewise tail, may\
  \ further hurt Gompertz (which needs steep rise). This is the final smoothness-weight\
  \ knob before declaring v6 the Phase A best."
model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims:
    - 64
    - 64
    - 64
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims:
    - 64
    - 64
    activation: silu
    use_layer_norm: false
    time_features:
    - t
    - log_t
    input_clamp_min: 0.01
    input_clamp_max: 1.0
  n_covariates: 1
training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 100.0
    baseline_ref: 0.0
evaluation:
  hazard_time_extension: 0.1
  thresholds:
    beta_rmse: 0.1
    hazard_irmse: 0.05
    c_index: 0.75
experiment_name: phaseA_v10_piecewise
simulation:
  baseline: PiecewiseConstantBaseline
  baseline_params:
    cutpoints:
    - 2.0
    rates:
    - 0.2
    - 0.6
  beta:
  - 1.5
  n_covariates: 1
  n_samples: 1000
  censoring_rate: 0.3
  censoring_type: random_exponential
  random_seed: 42
