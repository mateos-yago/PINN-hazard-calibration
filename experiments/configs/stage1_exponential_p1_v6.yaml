# Stage 1 v6: Much lower learning rates for stable convergence
# Changes from v2:
#   - lr: 0.001 → 0.0001 (100x smaller, for more stable ODE fitting)
#   - lr_beta: 0.01 → 0.001 (reduce β LR too for stability)
#   - n_epochs: 3000 → 5000 (more iterations with lower LR)
#   - Everything else same as v2

experiment_name: stage1_exp_p1_v6
rationale: "v2's loss history showed significant oscillation in final epochs (varying 2.04-2.8).
  This indicates training instability likely from high LR. Reduce LR 100x and increase epochs
  to allow slower, more stable convergence to better minimum."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 5000
  lr: 0.0001
  lr_beta: 0.001
  optimizer_name: adam
  weight_decay: 0.0
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
