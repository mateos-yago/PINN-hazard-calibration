checkpoint_every: 2000
collocation_method: uniform
experiment_name: phaseA_v4_exp
gradient_clip: 1.0
loss_weights:
  baseline_ref: 0.0
  ic: 0.0
  mle: 1.0
  monotonic: 0.1
  ode: 0.0
  pl: 0.25
  smoothness: 0.0
lr: 0.0003
lr_beta: 0.0001
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 1
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: "Sweep cell \u2014 architecture phaseA_v4, baseline exp, p=1. phaseA_v4\
  \ \u2014 quadrature parameterization with \u03B3-monotonicity prior. Stage 4 v14\
  \ had two regularizers (baseline_ref oracle + \u03B3-monotonicity). Removing baseline_ref\
  \ and the \u039B-surrogate (v2) recovered \u03B2 perfectly but left \u03B3 free\
  \ to spike. Re-adding the existing \u03B3-monotonicity prior should suppress the\
  \ descending slope after the spike, restoring a sensible hazard shape. This is the\
  \ closest direct mirror of v14's recipe under the new constraints."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.5
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
