rationale: "Sweep cell \u2014 architecture phaseC_v3, baseline gompertz, p=1. phaseC_v3\
  \ \u2014 strong ODE/IC coupling. v2 showed \u03B3 regularizers fix the v1 hump-and-decay\
  \ but \u03B2 still degrades because \u039B_\u03C6 is free to drift from \u222Bexp(\u03B3\
  ). Cranking ode/ic 100\xD7 should force \u039B_\u03C6 to track the integral of exp(\u03B3\
  ) tightly enough that \u03B2 recovers."
model:
  parameterization: factored_surrogate
  surrogate:
    hidden_dims:
    - 64
    - 64
    - 64
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims:
    - 64
    - 64
    activation: silu
    use_layer_norm: false
    time_features:
    - t
    - log_t
    input_clamp_min: 0.01
    input_clamp_max: 1.0
  n_covariates: 1
training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 100.0
    ic: 100.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0
evaluation:
  hazard_time_extension: 0.1
  thresholds:
    beta_rmse: 0.1
    hazard_irmse: 0.05
    c_index: 0.75
experiment_name: phaseC_v3_gompertz
simulation:
  baseline: GompertzBaseline
  baseline_params:
    a: 0.3
    b: 0.2
  beta:
  - 1.5
  n_covariates: 1
  n_samples: 1000
  censoring_rate: 0.3
  censoring_type: random_exponential
  random_seed: 42
