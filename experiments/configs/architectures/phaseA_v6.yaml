# Phase A v6: stronger smoothness (10x v5)
#
# Diff vs phaseA_v5: smoothness weight 0.1 → 10.0. v5 produced excellent fits
# on exp & gompertz but Weibull / piecewise had tail explosions (γ jumping from
# ~3 to ~7 over the last 15% of the normalized time range). v5 smoothness loss
# was 0.002 at end of training while MLE was -1 — the regularizer was 0.2% of
# the objective. Raise weight to make the smoothness penalty competitive when
# γ tries to spike.

rationale: "phaseA_v6 — smoothness weight 0.1 → 10.0. v5 architecture preserved
  the spike behavior at the right boundary because the smoothness term was 100×
  too small to compete with MLE. This is the simplest fix; if it over-smooths
  Gompertz/piecewise we revisit."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
