checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v18
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 10000
optimizer_name: adamw
rationale: "v16 is best so far: \u03B2=0.0271 \u2713, haz=0.0070 \u2713, c-index=0.7164.\
  \ Only C-index needs ~1.2% improvement. Extend training to 10000 epochs to give\
  \ more time for model to refine ranking predictions. v16 config (silu activation,\
  \ 9000 epochs) had smooth training, so more epochs should help."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
