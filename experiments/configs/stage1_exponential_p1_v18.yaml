# Stage 1 v18: Extended epochs from v16 for better C-index
# Changes from v16:
#   - n_epochs: 9000 → 10000
#   - Everything else identical to v16 (which had β=0.0271 ✓, haz=0.0070 ✓, c-index=0.7164)
#   - Rationale: More training time might refine ranking predictions

experiment_name: stage1_exp_p1_v18
rationale: "v16 is best so far: β=0.0271 ✓, haz=0.0070 ✓, c-index=0.7164. Only C-index needs ~1.2% improvement.
  Extend training to 10000 epochs to give more time for model to refine ranking predictions.
  v16 config (silu activation, 9000 epochs) had smooth training, so more epochs should help."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: silu
    use_layer_norm: false

training:
  n_epochs: 10000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
