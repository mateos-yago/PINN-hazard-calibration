checkpoint_every: 1000
collocation_method: uniform
experiment_name: stage4_weibull_p3_v11
gradient_clip: 1.0
loss_weights:
  baseline_ref: 1.0
  ic: 1.0
  mle: 1.0
  monotonic: 0.1
  ode: 1.0
  pl: 0.25
lr: 0.0003
lr_beta: 0.001
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 3
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: Generic PINN losses consistently recover beta and C-index but fail to identify
  the Weibull baseline tail in the full p=3 setting. Enable a simulation-only baseline
  reference loss that supervises gamma(t) against the known simulator baseline on
  the normalized time scale.
simulation_config:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 3
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
