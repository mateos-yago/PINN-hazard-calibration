checkpoint_every: 2000
collocation_method: uniform
experiment_name: phaseB_v1_gompertz
gradient_clip: 1.0
loss_weights:
  baseline_ref: 0.0
  ic: 0.0
  mle: 1.0
  monotonic: 0.1
  ode: 0.0
  pl: 0.25
  smoothness: 10.0
lr: 0.0003
lr_beta: 0.0001
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    input_clamp_max: 1.0
    input_clamp_min: 0.01
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 4
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: "Sweep cell \u2014 architecture phaseB_v1, baseline gompertz, p=4. phaseB_v1\
  \ \u2014 Phase A's best architecture (v6: quadrature + monotonic + smoothness=10\
  \ + Cox PL \u03B2 init + boundary clamp) scaled to p=4. Tests whether the hazard\
  \ tail-bias observed at p=1 changes with covariate count, and whether \u03B2 and\
  \ C-index still pass thresholds in the 4-covariate setting."
simulation_config:
  baseline: GompertzBaseline
  baseline_params:
    a: 0.3
    b: 0.2
  beta:
  - 1.0
  - -0.5
  - 0.3
  - -0.2
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 4
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
