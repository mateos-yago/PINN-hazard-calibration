checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v9
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    - 32
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 5000
optimizer_name: adamw
rationale: "v7 achieved \u03B2=0.1037, very close to threshold. v8's stronger regularization\
  \ made it worse. Try alternative: reduce surrogate network depth from [64,64,64]\
  \ to [32,32,32]. Smaller surrogate = less capacity to absorb covariate effect =\
  \ forces \u03B2 to be more accurate. Keep weight_decay=0.0001 from v7."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
