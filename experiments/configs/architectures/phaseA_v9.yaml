# Phase A v9: v6 architecture, eval extension=0
#
# Diff vs phaseA_v6: hazard_time_extension 0.10 → 0.0.
# Tests whether the failure is concentrated in the 10% extrapolation region
# past the observed maximum, or whether the divergence is fully within the
# observed data range.

rationale: "phaseA_v9 — v6 architecture with eval restricted to the observed
  time range (no 10% extension). The plots show divergence starts well inside
  the observed range, so this should isolate how much of the IRMSE is from
  extrapolation past t_max vs in-range divergence."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.0
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
