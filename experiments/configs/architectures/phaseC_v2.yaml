# Phase C v2: factored PINN + γ shape priors (smoothness + monotonic)
#
# Diff vs phaseC_v1: add smoothness=10 and monotonic=0.1 on γ. v1 confirmed
# that factoring the surrogate alone does NOT break the identifiability
# degeneracy — Λ_φ saturated (MLE preferred), so γ = dΛ_φ/dt became hump-shaped
# regardless of true α(t). The ODE residual was ~0.05 at end-of-training; the
# (Λ_φ, γ) pair was *consistent* but mis-shaped.
#
# Hypothesis: the regularization stack that worked for quadrature (phaseA_v6)
# should also rescue the factored PINN, because both share the same final γ
# objective. If γ is constrained to be non-decreasing and smooth, the
# saturating-Λ_φ / humped-γ solution is suppressed.
#
# This still keeps L_ODE and L_IC ACTIVE — γ and Λ_φ remain soft-coupled by
# physics constraints — so the model is genuinely a PINN.

rationale: "phaseC_v2 — factored PINN + γ smoothness=10 + γ monotonic=0.1.
  v1 showed that soft ODE/IC alone don't break the (Λ_φ, γ) degeneracy. Adding
  the v6 quadrature winner's regularizers on γ should pin γ to a sensible
  shape; the ODE then transfers that pinning to Λ_φ."

model:
  parameterization: factored_surrogate
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 1.0
    ic: 1.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
