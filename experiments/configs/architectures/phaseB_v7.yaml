# Phase B v7: density-aware MLE via inverse at-risk weighting
#
# Diff vs phaseB_v6: mle_weighting uniform -> inverse_at_risk.

rationale: "phaseB_v7 — conditional training-loop lever: density-aware MLE
  weighting. Per-observation MLE terms are weighted by inverse at-risk count
  with square-root power, normalized to mean one, and capped at 10x before
  renormalization. The goal is to increase right-tail gradient signal where
  sparse late times caused Weibull flattening and Gompertz boundary spikes."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, sqrt_t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0
    mle_weighting: inverse_at_risk
    mle_weight_power: 0.5
    mle_max_weight: 10.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
