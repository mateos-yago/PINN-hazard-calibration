# Stage 1 v16: Try SiLU activation instead of tanh
# Changes from v14:
#   - activation: 'tanh' → 'silu' (for both surrogate and coefficient networks)
#   - Everything else same as v14 (which had β=0.0373 ✓, haz=0.1450)
#   - Rationale: Protocol suggests silu is often better than tanh for PINNs

experiment_name: stage1_exp_p1_v16
rationale: "v14 achieved excellent β=0.0373 ✓ but hazard=0.1450 is main issue.
  Protocol suggests silu activation often better for PINNs than tanh.
  Try switching both surrogate and coefficient networks to silu.
  Might help with smoother gradient flow for hazard estimation."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: silu
    use_layer_norm: false

training:
  n_epochs: 9000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
