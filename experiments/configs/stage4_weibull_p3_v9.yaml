# Stage 4 v9: Shifted log-time linear Weibull head

experiment_name: stage4_weibull_p3_v9
rationale: "A Weibull baseline is linear in log(original time). Under MinMax time
  normalization this is log(t_norm + data_min / data_range), so use a linear
  coefficient head with the shifted log-time feature."

simulation:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta: [1.0, -0.5, 0.3]
  n_covariates: 3
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 1000
  random_seed: 42

model:
  n_covariates: 3
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: []
    activation: silu
    use_layer_norm: false
    time_features: [log_t_shifted]

training:
  n_epochs: 20000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 1000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 1.0
    ic: 1.0
    monotonic: 0.1
    min_slope: 0.1
    min_slope_margin: 0.4

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
