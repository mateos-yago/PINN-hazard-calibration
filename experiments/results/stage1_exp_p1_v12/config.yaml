checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v12
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 2.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 7000
optimizer_name: adamw
rationale: "v11 achieved \u03B2=0.0730 \u2713. Now focus on hazard (0.1741 vs need\
  \ <0.05). Increase ODE weight 2x to emphasize physics constraint on hazard. This\
  \ should push \u03B3(t) network to fit baseline more accurately. Also may help C-index\
  \ through better hazard ordering."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
