checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v4
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 2.0
  pl: 1.0
lr: 0.0005
lr_beta: 0.01
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 3000
optimizer_name: adam
rationale: "v3 showed \u03B2 improved (0.1858) but hazard got much worse (0.2977 vs\
  \ v2's 0.1396). Diagnostic: \u03B3(t) network underfitting. Increasing coefficient\
  \ network depth from [32,32] to [64,64,64] to allow better modeling of the constant\
  \ baseline hazard and its interaction with \u03B2."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0
