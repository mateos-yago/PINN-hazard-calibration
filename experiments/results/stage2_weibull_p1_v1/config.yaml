checkpoint_every: 500
collocation_method: uniform
experiment_name: stage2_weibull_p1_v1
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: Stage 1 established that the SiLU/AdamW configuration can recover beta
  and a constant baseline hazard. Move to Stage 2 with a Weibull baseline, keeping
  the same architecture and optimizer settings. Hazard evaluation uses a 10% upper
  time extension to check calibration slightly beyond the observed-time range; thresholds
  are unchanged because Stage 1 still passes under the expanded window.
simulation_config:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
