checkpoint_every: 1000
collocation_method: uniform
experiment_name: stage4_weibull_p3_v1
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  monotonic: 0.1
  ode: 1.0
  pl: 0.25
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 3
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 20000
optimizer_name: adamw
rationale: 'Stage 4 combines the non-constant Weibull baseline from Stage 2 with p=3
  covariates from Stage 3. Use the calibrated Stage 2 hazard setup: [t, log_t] coefficient
  inputs, monotonic gamma regularization, lower PL weight, and 20000 epochs. Seed
  42 has oracle C-index above 0.75 for this p=3 dataset.'
simulation_config:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 3
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
