# Phase B v9: event-only density-aware MLE
#
# Diff vs phaseB_v8: inverse-at-risk weights apply only to the event log-hazard
# term, not to the cumulative-hazard term.

rationale: "phaseB_v9 — event-only inverse-at-risk MLE weighting. v7/v8 applied
  weights to the full per-observation MLE and destabilized hazard scale,
  especially Gompertz. This variant uses the mild v8 weights but applies them
  only to the event log-hazard term, aiming to boost sparse right-tail event
  signal without multiplying the cumulative-hazard penalty."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, sqrt_t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0
    mle_weighting: inverse_at_risk
    mle_weight_power: 0.25
    mle_max_weight: 3.0
    mle_weight_target: event

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
