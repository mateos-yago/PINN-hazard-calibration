checkpoint_every: 2000
collocation_method: uniform
experiment_name: phaseC_v4_exp
gradient_clip: 1.0
loss_weights:
  baseline_ref: 0.0
  ic: 1.0
  mle: 1.0
  monotonic: 0.1
  ode: 1.0
  pl: 0.25
  smoothness: 10.0
lr: 0.0003
lr_beta: 0.0
lr_coefficient: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 64
    - 64
    input_clamp_max: 1.0
    input_clamp_min: 0.01
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 4
  parameterization: factored_surrogate
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: "Sweep cell \u2014 architecture phaseC_v4, baseline exp, p=4. phaseC_v4\
  \ \u2014 freeze \u03B2 at Cox PL init (lr_beta=0) on top of the v2 factored PINN.\
  \ Tests whether v2's \u03B2 degradation was the cause of its hazard miss or just\
  \ a coupled symptom."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  - -0.2
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 4
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
