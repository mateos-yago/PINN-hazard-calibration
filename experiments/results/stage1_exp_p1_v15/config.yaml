checkpoint_every: 500
collocation_method: observed_times
experiment_name: stage1_exp_p1_v15
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 9000
optimizer_name: adamw
rationale: "v14 achieved \u03B2=0.0373 \u2713, haz=0.1450. v13 showed observed_times\
  \ collocation gives haz=0.0593 (very close to passing!) but degraded \u03B2 to 0.2962.\
  \ Try v14 (9000 epochs, excellent \u03B2) with observed_times collocation. Goal:\
  \ observed_times emphasizes hazard fit at data times, while more epochs help \u03B2\
  \ stability."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
