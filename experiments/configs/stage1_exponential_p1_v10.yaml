# Stage 1 v10: Increase collocation points for better ODE fitting
# Changes from v7:
#   - n_collocation_points: 500 → 1000 (2x more ODE constraint points)
#   - Everything else same as v7 (best so far: β=0.1037, haz=0.1928)
#   - Rationale: More collocation = better ODE constraint coverage

experiment_name: stage1_exp_p1_v10
rationale: "v7 achieved best results so far (β=0.1037, haz=0.1928). β is just barely over threshold,
  but hazard is ~4x too high. Increase collocation points 2x (500→1000) to provide more ODE constraints
  and help γ(t) network fit baseline hazard more accurately."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 5000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 1000
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
