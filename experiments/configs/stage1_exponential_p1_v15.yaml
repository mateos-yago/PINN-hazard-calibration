# Stage 1 v15: v14 config with observed_times collocation for better hazard
# Changes from v14:
#   - collocation_method: 'uniform' → 'observed_times'
#   - Everything else same as v14
#   - Rationale: v14 has excellent β (0.0373). v13 showed observed_times gives haz=0.0593.
#     Try combining them with more epochs to maintain β while improving hazard.

experiment_name: stage1_exp_p1_v15
rationale: "v14 achieved β=0.0373 ✓, haz=0.1450. v13 showed observed_times collocation
  gives haz=0.0593 (very close to passing!) but degraded β to 0.2962.
  Try v14 (9000 epochs, excellent β) with observed_times collocation.
  Goal: observed_times emphasizes hazard fit at data times, while more epochs help β stability."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 9000
  lr: 0.0003
  lr_beta: 0.001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: observed_times
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.5
    ode: 1.0
    ic: 1.0
