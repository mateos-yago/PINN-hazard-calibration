# Phase A v8: early stopping (3000 epochs vs 12000)
#
# Diff vs phaseA_v6: n_epochs 12000 → 3000.
# Hypothesis: tail bias is overfitting, not steady-state. Fewer epochs may
# prevent γ from drifting in data-sparse regions while preserving bulk fit.

rationale: "phaseA_v8 — n_epochs 12000 → 3000. v6/v7 both had the same tail
  failure mode (overshoot for Weibull/Piecewise, undershoot for Gompertz) despite
  different γ-net sizes — suggests it's overfitting in late-event regions, not
  insufficient capacity. Shorter training is the simplest test of that hypothesis."

model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims: [64, 64]
    activation: silu
    use_layer_norm: false
    time_features: [t, log_t]
    input_clamp_min: 0.01
    input_clamp_max: 1.00

training:
  beta_initialization: cox_pl
  n_epochs: 3000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 10.0
    baseline_ref: 0.0

evaluation:
  hazard_time_extension: 0.10
  thresholds:
    beta_rmse: 0.10
    hazard_irmse: 0.05
    c_index: 0.75
