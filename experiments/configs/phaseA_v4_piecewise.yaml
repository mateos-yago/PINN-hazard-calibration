rationale: "Sweep cell \u2014 architecture phaseA_v4, baseline piecewise, p=1. phaseA_v4\
  \ \u2014 quadrature parameterization with \u03B3-monotonicity prior. Stage 4 v14\
  \ had two regularizers (baseline_ref oracle + \u03B3-monotonicity). Removing baseline_ref\
  \ and the \u039B-surrogate (v2) recovered \u03B2 perfectly but left \u03B3 free\
  \ to spike. Re-adding the existing \u03B3-monotonicity prior should suppress the\
  \ descending slope after the spike, restoring a sensible hazard shape. This is the\
  \ closest direct mirror of v14's recipe under the new constraints."
model:
  parameterization: quadrature
  quadrature_grid: 200
  surrogate:
    hidden_dims:
    - 64
    - 64
    - 64
    activation: silu
    use_layer_norm: false
  coefficient:
    hidden_dims:
    - 64
    - 64
    activation: silu
    use_layer_norm: false
    time_features:
    - t
    - log_t
  n_covariates: 1
training:
  beta_initialization: cox_pl
  n_epochs: 12000
  lr: 0.0003
  lr_coefficient: 0.001
  lr_beta: 0.0001
  optimizer_name: adamw
  weight_decay: 0.0001
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 2000
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 0.25
    ode: 0.0
    ic: 0.0
    monotonic: 0.1
    smoothness: 0.0
    baseline_ref: 0.0
evaluation:
  hazard_time_extension: 0.1
  thresholds:
    beta_rmse: 0.1
    hazard_irmse: 0.05
    c_index: 0.75
experiment_name: phaseA_v4_piecewise
simulation:
  baseline: PiecewiseConstantBaseline
  baseline_params:
    cutpoints:
    - 2.0
    rates:
    - 0.2
    - 0.6
  beta:
  - 1.5
  n_covariates: 1
  n_samples: 1000
  censoring_rate: 0.3
  censoring_type: random_exponential
  random_seed: 42
