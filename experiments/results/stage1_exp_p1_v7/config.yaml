checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v7
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 5000
optimizer_name: adamw
rationale: "v6 improved \u03B2 (0.1619) but hazard got worse (0.2782). Hypothesis:\
  \ surrogate is absorbing covariate effect, preventing \u03B2 from being accurate.\
  \ Add L2 regularization via AdamW to constrain model complexity and force better\
  \ \u03B2 estimates."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
