checkpoint_every: 500
collocation_method: uniform
experiment_name: stage1_exp_p1_v3
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 2.0
  pl: 1.0
lr: 0.0005
lr_beta: 0.01
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: tanh
    hidden_dims:
    - 32
    - 32
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: tanh
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 3000
optimizer_name: adam
rationale: "v2 showed \u03B2 converging slowly and hazard fit poor. Main symptoms:\
  \ L_PL gradient noise (\u03B2 estimate noisy despite training), and L_ODE not decreasing\
  \ smoothly (oscillating in final epochs). Increasing w2 to stabilize \u03B2 gradients,\
  \ increasing w3 to emphasize hazard fit, and reducing overall LR to avoid ODE oscillation."
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0
