checkpoint_every: 1000
collocation_method: uniform
experiment_name: stage3_exponential_p3_v1
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    time_features:
    - t
    use_layer_norm: false
  n_covariates: 3
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: Stage 2 passed after correcting evaluation scale and extending training.
  Advance to Stage 3 with the original Stage 1 SiLU/AdamW architecture, p=3, n=1000,
  and the same 10% extended hazard evaluation window. Monotonic regularization is
  disabled because the baseline is constant.
simulation_config:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta:
  - 1.0
  - -0.5
  - 0.3
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 3
  n_samples: 1000
  random_seed: 42
weight_decay: 0.0001
