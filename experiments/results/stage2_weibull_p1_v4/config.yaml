checkpoint_every: 500
collocation_method: uniform
experiment_name: stage2_weibull_p1_v4
gradient_clip: 1.0
loss_weights:
  ic: 1.0
  mle: 1.0
  ode: 1.0
  pl: 0.5
lr: 0.0003
lr_beta: 0.001
lr_patience: 200
lr_scheduler: reduce_on_plateau
model_config:
  coefficient:
    activation: silu
    hidden_dims:
    - 32
    - 32
    time_features:
    - t
    - log_t
    use_layer_norm: false
  n_covariates: 1
  surrogate:
    activation: silu
    hidden_dims:
    - 64
    - 64
    - 64
    use_layer_norm: false
n_collocation_points: 500
n_epochs: 12000
optimizer_name: adamw
rationale: v3 reduced hazard IRMSE substantially but introduced a downward tail bend.
  Keep the Weibull-friendly [t, log_t] input and reduce coefficient width back to
  [32, 32] to encourage a smoother hazard shape.
simulation_config:
  baseline: WeibullBaseline
  baseline_params:
    k: 1.5
    lam: 0.5
  beta:
  - 1.0
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_covariates: 1
  n_samples: 500
  random_seed: 42
weight_decay: 0.0001
