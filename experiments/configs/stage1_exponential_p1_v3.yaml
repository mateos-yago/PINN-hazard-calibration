# Stage 1 v3: Adjust loss weights to fix β and hazard convergence
# Changes from v2:
#   - w2 (PL weight) increased from 0.5 to 1.0 (reduce gradient noise in β)
#   - w3 (ODE weight) increased from 1.0 to 2.0 (emphasize hazard fitting)
#   - lr reduced from 0.001 to 0.0005 (ODE loss was oscillating, try slower updates)
#   - lr_beta kept at 0.01 (β still needs fast updates)

experiment_name: stage1_exp_p1_v3
rationale: "v2 showed β converging slowly and hazard fit poor. Main symptoms: L_PL gradient noise (β estimate noisy despite training),
  and L_ODE not decreasing smoothly (oscillating in final epochs). Increasing w2 to stabilize β gradients,
  increasing w3 to emphasize hazard fit, and reducing overall LR to avoid ODE oscillation."

simulation:
  baseline: ExponentialBaseline
  baseline_params:
    lam: 0.5
  beta: [1.0]
  n_covariates: 1
  censoring_rate: 0.3
  censoring_type: random_exponential
  n_samples: 500
  random_seed: 42

model:
  n_covariates: 1
  surrogate:
    hidden_dims: [64, 64, 64]
    activation: tanh
    use_layer_norm: false
  coefficient:
    hidden_dims: [32, 32]
    activation: tanh
    use_layer_norm: false

training:
  n_epochs: 3000
  lr: 0.0005
  lr_beta: 0.01
  optimizer_name: adam
  weight_decay: 0.0
  n_collocation_points: 500
  collocation_method: uniform
  checkpoint_every: 500
  gradient_clip: 1.0
  lr_scheduler: reduce_on_plateau
  lr_patience: 200
  loss_weights:
    mle: 1.0
    pl: 1.0
    ode: 2.0
    ic: 1.0
